<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JJ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #fff;
        color: #202124;
        overflow-x: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 64px;
        min-height: 64px;
        border-bottom: 1px solid #e0e0e0;
        background: #fff;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .site-name {
        font-weight: 800;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
        color: #202124;
        text-decoration: none;
      }

      .iframe-wrapper {
        flex: 1;
        display: flex;
        justify-content: center;
      }

      .iframe-wrapper iframe {
        width: 100%;
        max-width: 1200px;
        height: 100%;
        border: none;
        display: block;
        background: #fff;
      }

      @media (max-width: 600px) {
        header {
          padding: 0 16px;
          height: 56px;
          min-height: 56px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a class="site-name" href="/">Isaiah Dias</a>
    </header>

    <div class="iframe-wrapper">
      <iframe
        src="https://script.google.com/macros/s/AKfycbztxG8MZwOafY-I9uXrmN5TpwapuBIbgviodmCUtK6s6Ae9yK8bzAf23UNFoK0KktSN/exec"
        allow="fullscreen"
        loading="lazy"
      ></iframe>
    </div>
  </body>
</html>
