<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JJ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; min-height: 100vh;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #fff; color: #202124; overflow-x: hidden;
      }
      body { display: flex; flex-direction: column; }
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 24px; height: 64px; border-bottom: 1px solid #e0e0e0;
        background: #fff; position: sticky; top: 0; z-index: 10;
      }
      .site-name { font-weight: 800; font-size: 1.25rem; color: #202124; text-decoration: none; }
            .iframe-wrapper { display: flex; justify-content: center; }
      .iframe-wrapper iframe { width: 100%; max-width: 1200px; height: 800px; border: none; transition: height 0.2s ease; }
    </style>
  </head>
  <body>
    <header><a class="site-name" href="/">JJ</a></header>
        <div id="iframe-wrap" class="iframe-wrapper">
      <iframe id="gallery-iframe" src="" allow="fullscreen"></iframe>
    </div>
    <script>
      (function () {
        var iframe = document.getElementById("gallery-iframe");
                var scriptUrl = "https://script.google.com/macros/s/AKfycbztxG8MZwOafY-I9uXrmN5TpwapuBIbgviodmCUtK6s6Ae9yK8bzAf23UNFoK0KktSN/exec";

        window.addEventListener("message", function (e) {
          if (!e.data) return;
          if (e.data.type === "galleryLoaded") {
                      }
          if (e.data.type === "galleryHeight") {
            iframe.style.height = e.data.height + "px";
          }
          if (e.data.type === "galleryLightbox") {
            if (e.data.open) {
              document.documentElement.style.setProperty("overflow", "hidden", "important");
              document.body.style.setProperty("overflow", "hidden", "important");
              document.body.style.setProperty("touch-action", "none", "important");
            } else {
              document.documentElement.style.overflow = "";
              document.body.style.overflow = "";
              document.body.style.touchAction = "";
            }
            if (e.data.open) {
              var rect = iframe.getBoundingClientRect();
              iframe.contentWindow.postMessage({
                type: "galleryViewport",
                top: Math.round(Math.max(0, -rect.top)),
                height: Math.round(window.innerHeight),
              }, "*");
            }
          }
        });

        setTimeout(function () { iframe.src = scriptUrl; }, 100);
        setTimeout(function () {  }, 15000);
      })();
    </script>
  </body>
</html>
