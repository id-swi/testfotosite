<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>JJ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100vh;
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        background: #fff;
        color: #202124;
        overflow-x: hidden;
      }

      body {
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 24px;
        height: 64px;
        min-height: 64px;
        border-bottom: 1px solid #e0e0e0;
        background: #fff;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .site-name {
        font-weight: 800;
        font-size: 1.25rem;
        letter-spacing: -0.02em;
        color: #202124;
        text-decoration: none;
      }

      .iframe-wrapper iframe::-webkit-scrollbar {
        display: none;
      }

      .gallery-loader {
        text-align: center;
        padding: 100px 24px;
        color: #5f6368;
        font-weight: 500;
      }
      .auth-hint {
        display: none;
        text-align: center;
        padding: 60px 24px;
        border: 1px dashed #e0e0e0;
        border-radius: 12px;
        margin: 24px;
        max-width: 600px;
        align-self: center;
        font-family: "Inter", sans-serif;
      }
      .auth-btn {
        display: inline-block;
        padding: 12px 24px;
        background: #202124;
        color: #fff;
        text-decoration: none;
        border-radius: 24px;
        font-weight: 600;
        font-size: 0.875rem;
      }
      .auth-return {
        display: none;
        margin-top: 16px;
      }
      .is-hidden {
        display: none !important;
      }
      .iframe-wrapper {
        display: flex;
        justify-content: center;
      }
      .iframe-wrapper iframe {
        width: 100%;
        max-width: 1200px;
        height: 800px;
        border: none;
        transition: height 0.2s ease;
      }

      @media (max-width: 600px) {
        header {
          padding: 0 16px;
          height: 56px;
          min-height: 56px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <a class="site-name" href="/">Isaiah Dias</a>
    </header>

    <div id="gallery-loader" class="gallery-loader">Loading Gallery...</div>

    <div id="gallery-auth" class="auth-hint">
      <p>Please sign in to your Google account to view this private gallery.</p>
      <div id="auth-initial">
        <a
          href="https://script.google.com/macros/s/AKfycbzmGqRow3mdLzGc-K36jNJNqhyA5nA4DmF7ARcaWJmYVKpKAgNInQ0CZTvL4pHKTwsj/exec"
          onclick="onAuthorizeClick()"
          target="_blank"
          class="auth-btn"
          >Sign In / Authorize</a
        >
      </div>
      <div id="auth-return" class="auth-return">
        <p style="color: #1a73e8; margin-bottom: 8px">
          Success? Return here to load.
        </p>
        <button
          onclick="window.location.reload(true)"
          class="reload-btn"
          style="padding: 8px 20px; border-radius: 20px; cursor: pointer"
        >
          Reload Gallery
        </button>
      </div>
    </div>

    <div id="iframe-wrap" class="iframe-wrapper">
      <iframe id="gallery-iframe" src="" allow="fullscreen"></iframe>
    </div>
    <script>
      function onAuthorizeClick() {
        document.getElementById("auth-initial").style.display = "none";
        document.getElementById("auth-return").style.display = "block";
      }

      (function () {
        var iframe = document.getElementById("gallery-iframe");
        var loader = document.getElementById("gallery-loader");
        var auth = document.getElementById("gallery-auth");
        var wrap = document.getElementById("iframe-wrap");
        var hasLoaded = false;
        var scriptUrl =
          "https://script.google.com/macros/s/AKfycbzmGqRow3mdLzGc-K36jNJNqhyA5nA4DmF7ARcaWJmYVKpKAgNInQ0CZTvL4pHKTwsj/exec";

        window.addEventListener("message", function (e) {
          if (!e.data) return;

          var iframe = document.getElementById("gallery-iframe");

          // 1. Handle Height & Loading
          if (e.data.type === "galleryLoaded") {
            hasLoaded = true;
            loader.style.display = "none";
            auth.style.display = "none";
            wrap.classList.remove("is-hidden");
          }
          if (e.data.type === "galleryHeight") {
            iframe.style.height = e.data.height + "px";
          }

          // 2. ULTIMATE Scroll Lock & Positioning
          if (e.data.type === "galleryLightbox") {
            if (e.data.open) {
              // Lock scroll on ALL browsers
              document.documentElement.style.overflow = "hidden";
              document.body.style.overflow = "hidden";

              // Calculate precise position relative to where the user is looking
              var rect = iframe.getBoundingClientRect();
              iframe.contentWindow.postMessage(
                {
                  type: "galleryViewport",
                  top: Math.round(Math.max(0, -rect.top)),
                  height: Math.round(window.innerHeight),
                },
                "*",
              );
            } else {
              // Unlock scroll
              document.documentElement.style.overflow = "";
              document.body.style.overflow = "";
            }
          }
        });

        // Set src after a tiny delay to ensure listeners are ready
        setTimeout(function () {
          if (iframe) iframe.src = scriptUrl;
        }, 100);

        setTimeout(function () {
          if (!hasLoaded) {
            loader.style.display = "none";
            auth.style.display = "block";
            wrap.classList.add("is-hidden");
          }
        }, 5000);
      })();
    </script>
  </body>
</html>
